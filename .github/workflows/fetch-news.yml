name: fetch-news

# 국내 주요 증권사 뉴스를 1시간 간격으로 수집해 data/*.json 갱신.
# GitHub.com 호스팅 러너(상시 가동) — 특정 PC에 의존하지 않음. cron 은 UTC 기준.
on:
  schedule:
    - cron: '0 * * * *'      # 매시 정각 (튜닝 가능: '*/30 * * * *' = 30분 간격)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect news
        shell: pwsh
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: ./scripts/collect-news.ps1

      - name: Notify Telegram
        shell: pwsh
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: ./scripts/notify-telegram.ps1

      - name: Commit if changed
        shell: pwsh
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/news_history.json data/alerted.json 2>$null
          git add data/   # alerted.json 신규 생성 등 누락 방지
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "chore: update securities news [skip ci]"
            git push
            Write-Host "갱신 커밋/푸시 완료"
          } else {
            Write-Host "변경 없음 — 커밋 생략"
          }
